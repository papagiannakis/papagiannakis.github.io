<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 1200" width="2400" height="1200">
  <defs>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="10" height="10" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#c79a3b" stroke-width="2" opacity="0.4"/>
    </pattern>
    <style>
      .eyebrow    { font-family: 'Courier New', monospace; font-weight: 700; font-size: 22px; fill: #6b6760; letter-spacing: 5px; }
      .title      { font-family: Georgia, 'Times New Roman', serif; font-weight: 700; font-size: 76px; fill: #141414; }
      .subtitle   { font-family: Georgia, serif; font-style: italic; font-size: 30px; fill: #3a3833; }
      .lane-label { font-family: Georgia, serif; font-weight: 700; font-size: 38px; }
      .period-lbl { font-family: Georgia, serif; font-style: italic; font-weight: 700; font-size: 24px; }
      .event-yr   { font-family: 'Courier New', monospace; font-weight: 700; font-size: 22px; fill: #141414; }
      .event-lbl  { font-family: Georgia, serif; font-weight: 600; font-size: 24px; fill: #141414; }
      .event-lbl-soft { font-family: Georgia, serif; font-weight: 500; font-size: 22px; fill: #3a3833; }
      .axis-major { font-family: 'Courier New', monospace; font-weight: 700; font-size: 26px; fill: #141414; }
      .byline     { font-family: 'Courier New', monospace; font-weight: 700; font-size: 20px; fill: #141414; letter-spacing: 1.5px; }
      .credit     { font-family: 'Courier New', monospace; font-size: 19px; fill: #6b6760; letter-spacing: 1px; }
    </style>
  </defs>

  <rect width="2400" height="1200" fill="#f3eee2"/>

  <!-- HEADER -->
  <text x="120" y="80" class="eyebrow">ESSAY  ·  DATA  HISTORY  ·  MAY 2026</text>
  <text x="2280" y="80" class="eyebrow" text-anchor="end">1943 — 2026  ·  EIGHTY-THREE YEARS</text>
  <line x1="120" y1="105" x2="2280" y2="105" stroke="#141414" stroke-width="3"/>
  <text x="1200" y="195" class="title" text-anchor="middle">AI / VR — Eight Decades of Cycles</text>
  <text x="1200" y="245" class="subtitle" text-anchor="middle">Two technologies, one shared century — and the substrate that compounded through every supposed winter.</text>

  <!-- 1990s shared-winter shading (visual marker, no text) -->
  <rect x="1230" y="380" width="187" height="500" fill="#2d4a5e" opacity="0.06"/>

  <!-- 2012 shared-ignition vertical guide (visual marker, no text) -->
  <line x1="1903" y1="380" x2="1903" y2="880" stroke="#c79a3b" stroke-width="2" stroke-dasharray="8,5" opacity="0.75"/>

  <!-- 2022-24 eclipse arrow (from ChatGPT down to VR winter) -->
  <path d="M 2159 320 Q 2310 540, 2230 720" stroke="#b8341a" stroke-width="3" stroke-dasharray="7,5" fill="none" opacity="0.85"/>
  <polygon points="2230,720 2218,705 2235,706" fill="#b8341a"/>

  <!-- ============================== AI LANE ============================== -->
  <!-- x(year) = 140 + (year-1943) * 25.55 -->

  <rect x="140"  y="380" width="332" height="160" fill="url(#hatch)"/>
  <rect x="140"  y="380" width="332" height="160" fill="#c79a3b" opacity="0.10"/>
  <rect x="472"  y="380" width="459" height="160" fill="#d97a2c" opacity="0.50"/>
  <rect x="931"  y="380" width="154" height="160" fill="#2d4a5e" opacity="0.55"/>
  <rect x="1085" y="380" width="179" height="160" fill="#d97a2c" opacity="0.50"/>
  <rect x="1264" y="380" width="153" height="160" fill="#2d4a5e" opacity="0.55"/>
  <rect x="1417" y="380" width="486" height="160" fill="#9e9690" opacity="0.30"/>
  <rect x="1903" y="380" width="357" height="160" fill="#d97a2c" opacity="0.75"/>

  <text x="60" y="450" class="lane-label" fill="#b8341a" text-anchor="start">AI</text>
  <line x1="140" y1="460" x2="2260" y2="460" stroke="#141414" stroke-width="3"/>

  <text x="306"  y="425" class="period-lbl" text-anchor="middle" fill="#a07020">Foundations</text>
  <text x="701"  y="425" class="period-lbl" text-anchor="middle" fill="#a55a16">Summer I · Symbolic</text>
  <text x="1008" y="425" class="period-lbl" text-anchor="middle" fill="#1a3344">Winter I</text>
  <text x="1174" y="425" class="period-lbl" text-anchor="middle" fill="#a55a16">Sum. II</text>
  <text x="1340" y="425" class="period-lbl" text-anchor="middle" fill="#1a3344">Winter II</text>
  <text x="1660" y="425" class="period-lbl" text-anchor="middle" fill="#3a3833">Quiet · "ML" rebrand</text>
  <text x="2081" y="425" class="period-lbl" text-anchor="middle" fill="#a55a16">Summer III · Deep learning &amp; LLMs</text>

  <!-- AI events BELOW axis -->
  <g><line x1="140" y1="460" x2="140" y2="555" stroke="#c79a3b" stroke-width="3"/>
     <circle cx="140" cy="555" r="9" fill="#c79a3b" stroke="#b8341a" stroke-width="2"/>
     <text x="155" y="580" class="event-yr">1943</text>
     <text x="155" y="608" class="event-lbl">McCulloch &amp; Pitts</text></g>

  <g><line x1="472" y1="460" x2="472" y2="555" stroke="#b8341a" stroke-width="3"/>
     <circle cx="472" cy="555" r="9" fill="#b8341a" stroke="#141414" stroke-width="1.5"/>
     <text x="487" y="580" class="event-yr">1956</text>
     <text x="487" y="608" class="event-lbl">Dartmouth</text></g>

  <g><line x1="1519" y1="460" x2="1519" y2="555" stroke="#b8341a" stroke-width="3"/>
     <circle cx="1519" cy="555" r="9" fill="#b8341a" stroke="#141414" stroke-width="1.5"/>
     <text x="1534" y="580" class="event-yr">1997</text>
     <text x="1534" y="608" class="event-lbl">Deep Blue</text></g>

  <!-- 2012 AlexNet (IGNITION) -->
  <g><line x1="1903" y1="460" x2="1903" y2="555" stroke="#b8341a" stroke-width="4"/>
     <circle cx="1903" cy="555" r="12" fill="#b8341a" stroke="#141414" stroke-width="2"/>
     <text x="1918" y="580" class="event-yr" fill="#b8341a">2012</text>
     <text x="1918" y="608" class="event-lbl" font-weight="700">AlexNet</text></g>

  <g><line x1="2031" y1="460" x2="2031" y2="555" stroke="#b8341a" stroke-width="3"/>
     <circle cx="2031" cy="555" r="9" fill="#b8341a" stroke="#141414" stroke-width="1.5"/>
     <text x="2046" y="580" class="event-yr">2017</text>
     <text x="2046" y="608" class="event-lbl">Transformer</text></g>

  <!-- AI events ABOVE axis -->
  <g><line x1="931" y1="460" x2="931" y2="370" stroke="#2d4a5e" stroke-width="3" stroke-dasharray="6,4"/>
     <circle cx="931" cy="370" r="8" fill="#2d4a5e" stroke="#141414" stroke-width="1.5"/>
     <text x="916" y="358" class="event-yr" text-anchor="end" fill="#1a3344">1974</text>
     <text x="916" y="338" class="event-lbl-soft" text-anchor="end">DARPA cuts</text></g>

  <g><line x1="1264" y1="460" x2="1264" y2="370" stroke="#2d4a5e" stroke-width="3" stroke-dasharray="6,4"/>
     <circle cx="1264" cy="370" r="8" fill="#2d4a5e" stroke="#141414" stroke-width="1.5"/>
     <text x="1279" y="358" class="event-yr" fill="#1a3344">1987</text>
     <text x="1279" y="338" class="event-lbl-soft">LISP collapse</text></g>

  <!-- 2022 ChatGPT (eclipse moment, high above axis) -->
  <g><line x1="2159" y1="460" x2="2159" y2="305" stroke="#b8341a" stroke-width="4"/>
     <circle cx="2159" cy="305" r="14" fill="#b8341a" stroke="#141414" stroke-width="2"/>
     <text x="2159" y="285" class="event-yr" fill="#b8341a" text-anchor="middle">Nov 2022</text>
     <text x="2159" y="262" class="event-lbl" text-anchor="middle" font-weight="700" fill="#b8341a">ChatGPT</text></g>

  <!-- ============================== VR LANE ============================== -->
  <rect x="626"  y="720" width="587" height="160" fill="#9e9690" opacity="0.30"/>
  <rect x="1213" y="720" width="281" height="160" fill="#d97a2c" opacity="0.50"/>
  <rect x="1494" y="720" width="409" height="160" fill="#2d4a5e" opacity="0.55"/>
  <rect x="1903" y="720" width="153" height="160" fill="#d97a2c" opacity="0.50"/>
  <rect x="2056" y="720" width="51"  height="160" fill="#2d4a5e" opacity="0.35"/>
  <rect x="2107" y="720" width="52"  height="160" fill="#d97a2c" opacity="0.65"/>
  <rect x="2159" y="720" width="51"  height="160" fill="#2d4a5e" opacity="0.65"/>
  <rect x="2210" y="720" width="50"  height="160" fill="#c79a3b" opacity="0.55"/>

  <text x="60" y="810" class="lane-label" fill="#0d6e7d" text-anchor="start">VR</text>
  <line x1="140" y1="800" x2="2260" y2="800" stroke="#141414" stroke-width="3"/>

  <text x="919"  y="765" class="period-lbl" text-anchor="middle" fill="#3a3833">Pre-history — research labs</text>
  <text x="1353" y="765" class="period-lbl" text-anchor="middle" fill="#a55a16">VPL · Virtuality</text>
  <text x="1698" y="765" class="period-lbl" text-anchor="middle" fill="#1a3344">"VR is dead"</text>
  <text x="1980" y="765" class="period-lbl" text-anchor="middle" fill="#a55a16">Oculus</text>

  <!-- VR BELOW-axis events -->
  <g><line x1="626" y1="800" x2="626" y2="895" stroke="#0d6e7d" stroke-width="3"/>
     <circle cx="626" cy="895" r="9" fill="#0d6e7d" stroke="#141414" stroke-width="1.5"/>
     <text x="641" y="920" class="event-yr">1962</text>
     <text x="641" y="948" class="event-lbl">Sensorama</text></g>

  <g><line x1="780" y1="800" x2="780" y2="945" stroke="#0d6e7d" stroke-width="3"/>
     <circle cx="780" cy="945" r="9" fill="#0d6e7d" stroke="#141414" stroke-width="1.5"/>
     <text x="795" y="970" class="event-yr">1968</text>
     <text x="795" y="998" class="event-lbl">Sutherland HMD</text></g>

  <g><line x1="1673" y1="800" x2="1673" y2="895" stroke="#0d6e7d" stroke-width="3"/>
     <circle cx="1673" cy="895" r="8" fill="#0d6e7d" stroke="#141414" stroke-width="1.5"/>
     <text x="1688" y="920" class="event-yr">2003</text>
     <text x="1688" y="948" class="event-lbl">Second Life</text></g>

  <!-- 2012 Oculus KS (IGNITION) — short label to avoid collision with Vision Pro -->
  <g><line x1="1903" y1="800" x2="1903" y2="895" stroke="#0d6e7d" stroke-width="4"/>
     <circle cx="1903" cy="895" r="12" fill="#0d6e7d" stroke="#141414" stroke-width="2"/>
     <text x="1918" y="920" class="event-yr" fill="#0d6e7d">Aug 2012</text>
     <text x="1918" y="948" class="event-lbl" font-weight="700">Oculus KS</text></g>

  <g><line x1="2210" y1="800" x2="2210" y2="895" stroke="#0d6e7d" stroke-width="3"/>
     <circle cx="2210" cy="895" r="9" fill="#0d6e7d" stroke="#141414" stroke-width="1.5"/>
     <text x="2210" y="920" class="event-yr" text-anchor="end">Feb 2024</text>
     <text x="2210" y="948" class="event-lbl" text-anchor="end">Vision Pro</text></g>

  <!-- VR ABOVE-axis events — stagger Snow Crash (lower) vs Virtual Boy (higher) -->

  <!-- 1992 Snow Crash — lower stagger (closer to axis) -->
  <g><line x1="1392" y1="800" x2="1392" y2="710" stroke="#0d6e7d" stroke-width="3"/>
     <circle cx="1392" cy="710" r="9" fill="#0d6e7d" stroke="#141414" stroke-width="1.5"/>
     <text x="1377" y="700" class="event-yr" text-anchor="end">1992</text>
     <text x="1377" y="680" class="event-lbl" text-anchor="end">Snow Crash</text></g>

  <!-- 1995 Virtual Boy: dropped from cover (visually covered by the 1990s shared-winter shaded band); appears in the full timeline chart and HTML.  -->

  <!-- Oct 2021 Meta rebrand: dropped from cover (collides with AlexNet/Transformer labels in the gap); appears in the full timeline.  -->

  <!-- ========== X-AXIS YEARS ========== -->
  <text x="140"  y="1015" class="axis-major" text-anchor="start" fill="#c79a3b">1943</text>
  <text x="472"  y="1015" class="axis-major" text-anchor="middle" fill="#a55a16">1956</text>
  <text x="931"  y="1015" class="axis-major" text-anchor="middle" fill="#1a3344">1974</text>
  <text x="1264" y="1015" class="axis-major" text-anchor="middle" fill="#1a3344">1987</text>
  <text x="1903" y="1015" class="axis-major" text-anchor="middle" fill="#a55a16">2012</text>
  <text x="2260" y="1015" class="axis-major" text-anchor="end">2026</text>

  <!-- ========== FOOTER ========== -->
  <line x1="120" y1="1075" x2="2280" y2="1075" stroke="#141414" stroke-width="2"/>
  <text x="120"  y="1115" class="byline">DR. GEORGE PAPAGIANNAKIS</text>
  <text x="120"  y="1145" class="credit">ORAMAVR  ·  FORTH-ICS  ·  UNIVERSITY OF CRETE</text>
  <text x="2280" y="1115" class="byline" text-anchor="end" fill="#b8341a">→ papagiannakis.github.io</text>
  <text x="2280" y="1145" class="credit" text-anchor="end">DESIGNED WITH ANTHROPIC CLAUDE  ·  MAY 2026</text>

  <rect x="120" y="1170" width="18" height="18" fill="#b8341a"/>
  <text x="146" y="1185" class="credit" fill="#3a3833">AI</text>
  <rect x="190" y="1170" width="18" height="18" fill="#0d6e7d"/>
  <text x="216" y="1185" class="credit" fill="#3a3833">VR / METAVERSE</text>
</svg>
